name: LRGSkyBlock-Core
version: 0.4.15
main: me.lrg.skyblock.core.LRGSkyBlockCore
api-version: "1.20"

author: LRG

softdepend:
  - PlaceholderAPI

commands:
  coins:
    description: Coinsを確認・操作するコマンド
    usage: /coins
    aliases:
      - coin

  stats:
    description: ステータスを確認・操作するコマンド
    usage: /stats
    aliases:
      - stat

permissions:
  lrgskyblock.command.coins:
    description: Coins確認コマンドの使用権限
    default: true

  lrgskyblock.command.coins.admin:
    description: Coins管理コマンドの使用権限
    default: op

  lrgskyblock.command.stats:
    description: ステータス確認コマンドの使用権限
    default: true

  lrgskyblock.command.stats.admin:
    description: ステータス管理コマンドの使用権限
    default: op