name: LRGSkyBlock-Core
version: 0.7.4
main: me.lrg.skyblock.core.LRGSkyBlockCore
api-version: "26.2"
author: LRG
softdepend:
  - PlaceholderAPI
commands:
  coins:
    description: Coinsを確認・操作するコマンド
    usage: /coins
    aliases: [coin]
  stats:
    description: ステータスを確認・操作するコマンド
    usage: /stats
    aliases: [stat]
  actionbar:
    description: Health・ManaのActionBar表示を切り替えるコマンド
    usage: /actionbar <on|off|toggle|status>
    aliases: [ab]
  statscache:
    description: Statsキャッシュ状態を確認するコマンド
    usage: /statscache [save]
  fortunegui:
    description: Fortuneカテゴリ設定GUIを開く
    usage: /fortunegui
    permission: lrgskyblock.command.fortunegui
  level:
    description: Player Levelを確認・操作するコマンド
    usage: /level [player] | /level <set|addxp|removexp> <player> <value>
    aliases: [playerlevel]
  wardrobe:
    description: Wardrobeを開くコマンド
    usage: /wardrobe
    aliases: [wd]
  bazaar:
    description: Bazaarを開く・管理するコマンド
    usage: /bazaar [admin]
    aliases: [bz]
  rank:
    description: ランク表示を確認・デバッグするコマンド
    usage: /rank [player] | /rank <set|reset> <player> [rank]
  lrg:
    description: LRG SkyBlock管理コマンド
    usage: /lrg stats <view|set|add|reset|recalculate>
permissions:
  lrgskyblock.command.coins:
    default: true
  lrgskyblock.command.coins.admin:
    default: op
  lrgskyblock.command.stats:
    default: true
  lrgskyblock.command.actionbar:
    default: true
  lrgskyblock.command.stats.admin:
    default: op
  lrgskyblock.command.lrg.stats:
    default: op
  lrgskyblock.command.fortunegui:
    default: op
  lrgskyblock.command.level:
    default: true
  lrgskyblock.command.level.admin:
    default: op
  lrgskyblock.command.wardrobe:
    default: true
  lrgskyblock.command.bazaar:
    default: true
  lrgskyblock.command.bazaar.admin:
    default: op
  lrgskyblock.command.rank:
    default: true
  lrgskyblock.command.rank.admin:
    default: op
  lrgskyblock.rank.vip:
    default: false
  lrgskyblock.rank.vip-plus:
    default: false
  lrgskyblock.rank.mvp:
    default: false
  lrgskyblock.rank.mvp-plus:
    default: false
  lrgskyblock.rank.mvp-plus-plus:
    default: false
  lrgskyblock.rank.youtube:
    default: false
  lrgskyblock.rank.staff:
    default: false
  lrgskyblock.rank.admin:
    default: op
  lrgskyblock.badge.youtube:
    description: 旧YouTube権限との互換用
    default: false
