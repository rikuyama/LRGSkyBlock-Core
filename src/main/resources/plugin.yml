name: LRGSkyBlock-Core
version: 0.4.4
main: me.lrg.skyblock.core.LRGSkyBlockCore
api-version: "1.20"

author: LRG

softdepend:
  - PlaceholderAPI

commands:
  coins:
    description: Coinsを確認・操作するコマンド
    usage: /coins
    aliases:
      - coin

  stats:
    description: Statsを確認・操作するコマンド
    usage: /stats
    aliases:
      - stat

permissions:
  lrgskyblock.command.coins:
    description: Coins確認コマンドの使用権限
    default: true

  lrgskyblock.command.coins.admin:
    description: Coins管理コマンドの使用権限
    default: op

  lrgskyblock.command.stats:
    description: Stats確認コマンドの使用権限
    default: true

  lrgskyblock.command.stats.admin:
    description: Stats管理コマンドの使用権限
    default: op