name: LRGSkyBlock-Core
version: 0.7.0
main: me.lrg.skyblock.core.LRGSkyBlockCore
api-version: "26.2"
author: LRG
softdepend:
  - PlaceholderAPI
commands:
  coins:
    description: Coinsを確認・操作するコマンド
    usage: /coins
    aliases: [coin]
  stats:
    description: ステータスを確認・操作するコマンド
    usage: /stats
    aliases: [stat]
  actionbar:
    description: Health・ManaのActionBar表示を切り替えるコマンド
    usage: /actionbar <on|off|toggle|status>
    aliases: [ab]
  statscache:
    description: Statsキャッシュ状態を確認するコマンド
    usage: /statscache [save]
  fortunegui:
    description: Fortuneカテゴリ設定GUIを開く
    usage: /fortunegui
    permission: lrgskyblock.command.fortunegui
  level:
    description: Player Levelを確認・操作するコマンド
    usage: /level [player] | /level addxp <player> <amount>
    aliases: [playerlevel]
  lrg:
    description: LRG SkyBlock管理コマンド
    usage: /lrg stats <view|set|add|reset|recalculate>
permissions:
  lrgskyblock.command.coins:
    default: true
  lrgskyblock.command.coins.admin:
    default: op
  lrgskyblock.command.stats:
    default: true
  lrgskyblock.command.actionbar:
    default: true
  lrgskyblock.command.stats.admin:
    default: op
  lrgskyblock.command.lrg.stats:
    default: op
  lrgskyblock.command.fortunegui:
    description: Fortuneカテゴリ設定GUIの使用権限
    default: op

  lrgskyblock.command.level:
    default: true
  lrgskyblock.command.level.admin:
    default: op

  lrgskyblock.rank.vip:
    description: VIPランク
    default: false
  lrgskyblock.rank.vip-plus:
    description: VIP+ランク
    default: false
  lrgskyblock.rank.mvp:
    description: MVPランク
    default: false
  lrgskyblock.rank.mvp-plus:
    description: MVP+ランク
    default: false
  lrgskyblock.rank.mvp-plus-plus:
    description: MVP++ランク
    default: false
  lrgskyblock.rank.moderator:
    description: Moderatorランク
    default: false
  lrgskyblock.rank.builder:
    description: Builderランク
    default: false
  lrgskyblock.rank.engineer:
    description: Engineerランク
    default: false
  lrgskyblock.rank.admin:
    description: Adminランク
    default: op
  lrgskyblock.badge.youtube:
    description: YouTubeバッジ
    default: false
